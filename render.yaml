services:
  - type: web
    name: fpl-liga
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://gduuhbvkyjcesahmooon.supabase.co
      - key: SUPABASE_KEY
        sync: false

  - type: cron
    name: fpl-daily-sync
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python sync.py
    schedule: "0 9 * * *"
    envVars:
      - key: SUPABASE_URL
        value: https://gduuhbvkyjcesahmooon.supabase.co
      - key: SUPABASE_KEY
        sync: false
